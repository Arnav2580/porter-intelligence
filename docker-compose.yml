version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: porter
      POSTGRES_PASSWORD: porter
      POSTGRES_DB: porter_intelligence
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U porter"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://porter:porter@postgres:5432/porter_intelligence
      REDIS_URL: redis://redis:6379
      APP_ENV: production
      LOG_LEVEL: info
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-EXBtipXs6jmJR5swf0tO06vd9cS4Nvt9fyjlX1gjz88=}
    volumes:
      - ./data:/app/data
      - ./model/weights:/app/model/weights
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.49.0
    container_name: porter-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./infrastructure/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
    restart: unless-stopped
    depends_on:
      - api

  grafana:
    image: grafana/grafana:10.3.0
    container_name: porter-grafana
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER:     admin
      GF_SECURITY_ADMIN_PASSWORD: Porter2024!
      GF_USERS_ALLOW_SIGN_UP:     "false"
      GF_AUTH_ANONYMOUS_ENABLED:  "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infrastructure/grafana/provisioning:/etc/grafana/provisioning:ro
    restart: unless-stopped
    depends_on:
      - prometheus

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:
